name: CI

on:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: tracksync/go.mod

      - name: Vet client
        run: cd tracksync && go vet ./...

      - name: Build client
        run: cd tracksync && go build .

      - name: Test client
        run: cd tracksync && go test ./...

      - name: Vet server
        run: cd server && go vet ./...

      - name: Build server
        run: cd server && go build .

      - name: Test server
        run: cd server && go test ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          working-directory: tracksync

      - name: Lint server
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          working-directory: server

  nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30

      - name: Build
        run: nix build
